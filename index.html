async function fbGetClients() {

const snap = await getDocs(collection(db, “clients”));
return snap.docs.map(d => ({ id: d.id, …d.data() }));
}
async function fbSaveClient(client) {
const { doc, setDoc } = await import(“https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js”);
const db = await getDb();
await setDoc(doc(db, “clients”, String(client.id)), client);
}

async function fbGetTrainer() {

const snap = await getDoc(doc(db, “settings”, “trainer”));
return snap.exists() ? snap.data() : DEFAULT_TRAINER;
}
async function fbSaveTrainer(t) {

async function fbSubscribeClients(cb) {

const db = await getDb();
return onSnapshot(collection(db, “clients”), snap => cb(snap.docs.map(d => ({ id: d.id, …d.data() }))));
}
async function fbSubscribeClient(id, cb) {
const { doc, onSnapshot } = await import(“https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js”);
const db = await getDb();
return onSnapshot(doc(db, “clients”, String(id)), snap => { if (snap.exists()) cb({ id: snap.id, …snap.data() }); });
}

// ─── PROGRESS TRACKER ─────────────────────────────────────────────────────────
function ProgressTracker({ clientId }) {
const PROG_KEY = “fitbyanubhav-progress-” + clientId;
const loadProg = () => { try { const r = localStorage.getItem(PROG_KEY); return r ? JSON.parse(r) : []; } catch { return []; } };
const saveProg = (d) => { try { localStorage.setItem(PROG_KEY, JSON.stringify(d)); } catch {} };
const [entries, setEntries] = useState(loadProg);
const [form, setForm] = useState({ date: new Date().toISOString().split(“T”)[0], weight: “”, chest: “”, waist: “”, hips: “”, note: “” });
const [showForm, setShowForm] = useState(false);

const addEntry = () => {
if (!form.weight && !form.chest && !form.waist && !form.hips) return;
const updated = […entries, { …form, id: Date.now() }].sort((a, b) => a.date.localeCompare(b.date));
setEntries(updated); saveProg(updated);
setForm({ date: new Date().toISOString().split(“T”)[0], weight: “”, chest: “”, waist: “”, hips: “”, note: “” });
setShowForm(false);
};
const deleteEntry = (id) => { const u = entries.filter(e => e.id !== id); setEntries(u); saveProg(u); };

const metrics = [
{ key: “weight”, label: “Weight”, unit: “kg”, color: “#818cf8” },
{ key: “chest”, label: “Chest”, unit: “cm”, color: “#f97316” },
{ key: “waist”, label: “Waist”, unit: “cm”, color: “#10b981” },
{ key: “hips”, label: “Hips”, unit: “cm”, color: “#ec4899” },
];

const ChartLine = ({ metric }) => {
const pts = entries.filter(e => e[metric.key]).map(e => ({ date: e.date, val: parseFloat(e[metric.key]) }));
if (pts.length < 2) return <div style={{ color: “#334155”, fontSize: 12, padding: “8px 0” }}>Log at least 2 entries to see chart</div>;
const min = Math.min(…pts.map(p => p.val)) * 0.97;
const max = Math.max(…pts.map(p => p.val)) * 1.03;
const W = 400, H = 80;
const x = (i) => (i / (pts.length - 1)) * (W - 20) + 10;
const y = (v) => H - ((v - min) / (max - min)) * (H - 12) - 6;
const path = pts.map((p, i) => (i === 0 ? “M” : “L”) + “ “ + x(i) + “ “ + y(p.val)).join(” “);
const diff = pts[pts.length-1].val - pts[0].val;
return (
<div style={{ marginBottom: 6 }}>
<div style={{ display: “flex”, justifyContent: “space-between”, marginBottom: 4 }}>
<span style={{ fontSize: 12, color: metric.color, fontWeight: 700 }}>{metric.label} ({metric.unit})</span>
<span style={{ fontSize: 12, color: diff < 0 ? “#10b981” : diff > 0 ? “#f97316” : “#64748b” }}>{diff > 0 ? “+” : “”}{diff.toFixed(1)} overall</span>
</div>
<svg width=“100%” viewBox={“0 0 “ + W + “ “ + H} style={{ overflow: “visible” }}>
<defs><linearGradient id={“g” + metric.key} x1=“0” y1=“0” x2=“0” y2=“1”><stop offset="0%" stopColor={metric.color} stopOpacity="0.25" /><stop offset="100%" stopColor={metric.color} stopOpacity="0" /></linearGradient></defs>
<path d={path + “ L “ + x(pts.length-1) + “ “ + H + “ L “ + x(0) + “ “ + H + “ Z”} fill={“url(#g” + metric.key + “)”} />
<path d={path} fill="none" stroke={metric.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
{pts.map((p, i) => <g key={i}><circle cx={x(i)} cy={y(p.val)} r="3" fill={metric.color} /><text x={x(i)} y={y(p.val)-7} textAnchor="middle" fill="#94a3b8" fontSize="9">{p.val}</text></g>)}
</svg>
<div style={{ display: “flex”, justifyContent: “space-between”, fontSize: 10, color: “#475569”, marginTop: 2 }}>
{pts.map((p, i) => <span key={i}>{p.date.slice(5)}</span>)}
</div>
</div>
);
};

return (
<div style={{ marginTop: 8 }}>
<div style={{ display: “flex”, alignItems: “center”, justifyContent: “space-between”, marginBottom: 18 }}>

<div style={{ fontSize: 18, fontWeight: 700 }}>📈 Progress Tracker</div>

{showForm && (
<div style={{ background: “rgba(15,23,42,0.9)”, border: “1px solid rgba(99,102,241,0.25)”, borderRadius: 16, padding: 20, marginBottom: 20 }}>

function SettingsView({ creds, onSave, onBack }) {
const [form, setForm] = useState({ name: creds.name, email: creds.email, currentPassword: “”, newPassword: “”, confirmPassword: “” });
const [status, setStatus] = useState(null); // “success” | “error” | null

const handleSave = () => {
setStatus(null);
// Validate current password
if (form.currentPassword !== creds.password) {
setStatus(“error”); setMsg(“Current password is incorrect.”); return;
}
if (form.newPassword && form.newPassword !== form.confirmPassword) {
setStatus(“error”); setMsg(“New passwords don't match.”); return;
}
if (form.newPassword && form.newPassword.length < 6) {
setStatus(“error”); setMsg(“New password must be at least 6 characters.”); return;
}
const updated = {
name: form.name || creds.name,
email: form.email || creds.email,
password: form.newPassword || creds.password
};
onSave(updated);
setStatus(“success”);
setMsg(form.newPassword ? “Password updated successfully! ✓” : “Profile updated successfully! ✓”);
setForm(f => ({ …f, currentPassword: “”, newPassword: “”, confirmPassword: “” }));
};

export default function App() {
const [session, setSession] = useState(null);
const [loading, setLoading] = useState(true);

useEffect(() => {
if (USE_FIREBASE) {
// Firebase mode: seed default data if empty
seedIfEmpty()
.then(() => setLoading(false))
.catch(() => setLoading(false));
} else {
// localStorage mode: ready immediately
setLoading(false);
}
}, []);

if (loading) return (
<div style={{ minHeight: “100vh”, background: “#060a10”, display: “flex”, flexDirection: “column”, alignItems: “center”, justifyContent: “center”, fontFamily: “sans-serif”, color: “white”, gap: 16 }}>
<div style={{ width: 50, height: 50, background: “linear-gradient(135deg,#6366f1,#8b5cf6)”, borderRadius: 14, display: “flex”, alignItems: “center”, justifyContent: “center”, fontSize: 24 }}>⚡</div>
<div style={{ fontSize: 16, color: “#475569” }}>{USE_FIREBASE ? “Connecting to database…” : “Loading…”}</div>
</div>
);
